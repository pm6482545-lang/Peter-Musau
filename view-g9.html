    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --light: #f4f7f6; }

        }
        .back-btn { color: white; text-decoration: none; border: 1px solid white; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; display: inline-block; margin-bottom: 8px; }
        .empty-msg { padding: 40px; color: #888; font-style: italic; }
    </style>
</head>
