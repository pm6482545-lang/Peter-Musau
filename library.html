<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Hub | Peter Musau</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); text-align: center; }
        header { background: var(--primary); color: white; padding: 40px 20px; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
        
        /* The Folder Button */
        .folder-card {
            background: white; border-radius: 12px; padding: 30px;
            text-decoration: none; color: var(--primary);
            border: 1px solid #ddd; display: block;
            transition: 0.3s;
        }
        .folder-card:hover { transform: translateY(-5px); border-color: var(--secondary); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .icon { font-size: 50px; display: block; margin-bottom: 10px; }
        .name { font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Digital Resource Library</h1>
    <p>Choose a category to find your documents</p>
</header>

<div class="container">
    <div class="folder-grid">
        <a href="pp1-view.html" class="folder-card">
            <span class="icon">📁</span>
            <span class="name">PP1 Resources</span>
        </a>

        <a href="kcse-view.html" class="folder-card">
            <span class="icon">📂</span>
            <span class="name">KCSE Revision</span>
        </a>

        <a href="pro-view.html" class="folder-card">
            <span class="icon">💼</span>
            <span class="name">Teacher's Corner</span>
        </a>
    </div>
</div>

</body>
</html>
