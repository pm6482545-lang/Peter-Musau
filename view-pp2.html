<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources | Peter Musau</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); text-align: center; }
        header { background: var(--secondary); color: white; padding: 25px; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 800px; margin: 20px auto; padding: 15px; }
        .doc-card {
            background: white; padding: 20px; border-radius: 12px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; 
            align-items: center; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .doc-info { text-align: left; }
        .doc-name { font-weight: bold; color: var(--primary); display: block; font-size: 1.1rem; }
        .doc-sub { color: #666; font-size: 0.85rem; }
        .btn-download { 
            background: var(--primary); color: white; text-decoration: none; 
            padding: 10px 20px; border-radius: 6px; font-weight: bold; font-size: 0.9rem;
        }
        .back-btn { color: white; text-decoration: none; border: 1px solid white; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; display: inline-block; margin-bottom: 8px; }
        .empty-msg { padding: 40px; color: #888; font-style: italic; }
    </style>
</head>
<body>

<header>
    <a href="library.html" class="back-btn">← Back to Library</a>
    <h1>PP2 RESOURCES</h1>
</header>

<div class="container">
    
    <div class="empty-msg">
        <p>No documents uploaded yet for this level.</p>
        <p>Check back soon!</p>
    </div>

    </div>

</body>
</html>
